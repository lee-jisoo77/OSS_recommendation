services:
  back:
    build: ./back
    container_name: back
    ports:
      - "8000:8000"
    networks:
      - app-network

  front:
    build: ./front
    container_name: front
    ports:
      - "8501:8501"
    depends_on:
      - back
    networks:
      - app-network

networks:
  app-network:
    driver: bridge